# Per-scenario goal pose (frame: map) + run timeout.
# Drone always spawns at (0, 0, 0) facing +X in ENU.
# Success = drone within 0.5 m of goal in XY before timeout.

scenario_1_pole:
  x: 8.0       # 4 m past the pole at (4, 0); forces the drone to actually
  y: 0.0       # round it and continue straight, not just brake near it.
  z: 1.5
  timeout_s: 40

scenario_2_slalom:
  x: 7.0
  y: 0.0
  z: 1.5
  timeout_s: 40

scenario_3_corner:
  x: 4.0
  y: 4.0
  z: 1.5
  timeout_s: 50

scenario_4_gap:
  x: 7.0
  y: 0.0
  z: 1.5
  timeout_s: 40
