# ============================================================
# ros_gz_bridge config for F450 drone sensors
# Compatible with: ros-humble-ros-gzharmonic-bridge
# Gazebo Harmonic 8.x + ROS2 Humble
#
# Run with:
#   ros2 run ros_gz_bridge parameter_bridge \
#     --ros-args -p config_file:=<path>/sensor_bridge.yaml
#
# NOTE: All 5 ToF sensors are now on a single 'tof_array_link'
#       in the SDF, but bridge topics are unchanged.
# ============================================================

# ── ToF Array (all 5 sensors share tof_array_link frame) ───
# depth image topics (32FC1 float — use Normalize Range in RViz2)

- ros_topic_name: "/drone/tof_0/depth"
  gz_topic_name:  "/tof_0_depth"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/drone/tof_0/points"
  gz_topic_name:  "/tof_0_depth/points"
  ros_type_name:  "sensor_msgs/msg/PointCloud2"
  gz_type_name:   "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

